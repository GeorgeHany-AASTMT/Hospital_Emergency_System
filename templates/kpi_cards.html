<div class="kpi-grid">
    <div class="kpi-card" id="kpi-finished">
        <div class="kpi-icon"><i class="fa-solid fa-check-double"></i></div>
        <div class="kpi-data">
            <h3>Finished Treatments</h3>
            <p class="kpi-value" id="val-finished">0</p>
        </div>
    </div>
    <div class="kpi-card" id="kpi-waiting">
        <div class="kpi-icon"><i class="fa-solid fa-users-line"></i></div>
        <div class="kpi-data">
            <h3>Waiting on Queues</h3>
            <p class="kpi-value" id="val-waiting">0</p>
        </div>
    </div>
    <div class="kpi-card" id="kpi-scheduled">
        <div class="kpi-icon"><i class="fa-solid fa-calendar-days"></i></div>
        <div class="kpi-data">
            <h3>Scheduled for Future</h3>
            <p class="kpi-value" id="val-scheduled">0</p>
        </div>
    </div>
</div>
